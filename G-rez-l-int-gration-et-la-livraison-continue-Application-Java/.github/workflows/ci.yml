name: CI Pipeline

on:
  push:
    branches: [main, develop, test-workflow]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect project type
        id: detect
        run: |
          if [ -f "package.json" ]; then
            echo "type=node" >> $GITHUB_OUTPUT
          elif [ -f "gradlew" ]; then
            echo "type=gradle" >> $GITHUB_OUTPUT
          else
            echo "No supported project detected"
            exit 1
          fi

      # --- Node/Angular ---
      - name: Setup Node.js
        if: steps.detect.outputs.type == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.detect.outputs.type == 'node'
        run: npm ci

      - name: Run Angular tests
        if: steps.detect.outputs.type == 'node'
        run: npm test

      - name: Upload Angular test results
        if: steps.detect.outputs.type == 'node' && always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: reports/

      # --- Gradle/Java ---
      - name: Setup JDK 21
        if: steps.detect.outputs.type == 'gradle'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Run Gradle tests
        if: steps.detect.outputs.type == 'gradle'
        run: ./gradlew clean test

      - name: Upload Java test results
        if: steps.detect.outputs.type == 'gradle' && always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/test-results/test/

      # --- Publish test report ---
      - name: Publish Angular test report
        if: steps.detect.outputs.type == 'node' && always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: reports/*.xml
          reporter: java-junit
          fail-on-error: true

      - name: Publish Java test report
        if: steps.detect.outputs.type == 'gradle' && always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: build/test-results/test/*.xml
          reporter: java-junit
          fail-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        id: image
        run: echo "name=${IMAGE_NAME,,}" >> $GITHUB_OUTPUT

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      packages: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/exec
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        if: steps.semantic.outputs.new_release_published == 'true'
        id: image
        run: echo "name=${IMAGE_NAME,,}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image with version tag
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.semantic.outputs.new_release_version }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest

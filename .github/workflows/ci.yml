name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

permissions:
  contents: write
  checks: write
  packages: write

jobs:
  setup:
    name: Setup Image Names
    runs-on: ubuntu-latest
    outputs:
      angular_image: ${{ steps.names.outputs.angular }}
      java_image: ${{ steps.names.outputs.java }}
    steps:
      - name: Compute lowercase image names
        id: names
        run: |
          REPO="${GITHUB_REPOSITORY,,}"
          echo "angular=ghcr.io/${REPO}/angular-app" >> "$GITHUB_OUTPUT"
          echo "java=ghcr.io/${REPO}/java-app" >> "$GITHUB_OUTPUT"

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: G-rez-l-int-gration-et-la-livraison-continue-Application-Angular/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Run tests
        id: tests
        run: |
          bash run-tests.sh
          echo "code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/**/*.xml

      - name: Publish Angular test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Angular Test Results
          path: test-results/G-rez-l-int-gration-et-la-livraison-continue-Application-Angular/*.xml
          reporter: java-junit

      - name: Publish Java test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Java Test Results
          path: test-results/G-rez-l-int-gration-et-la-livraison-continue-Application-Java/*.xml
          reporter: java-junit

      - name: Fail job if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1

  build-angular:
    name: Build & Push Angular
    needs: [test, setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.setup.outputs.angular_image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-

      - name: Build and push Angular image
        uses: docker/build-push-action@v6
        with:
          context: G-rez-l-int-gration-et-la-livraison-continue-Application-Angular
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=angular
          cache-to: type=gha,mode=max,scope=angular

  build-java:
    name: Build & Push Java
    needs: [test, setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.setup.outputs.java_image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-

      - name: Build and push Java image
        uses: docker/build-push-action@v6
        with:
          context: G-rez-l-int-gration-et-la-livraison-continue-Application-Java
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=java
          cache-to: type=gha,mode=max,scope=java

  release-angular:
    name: Release Angular
    needs: [test, build-angular]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.semantic.outputs.new_release_version }}
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install semantic-release
        run: npm install -g semantic-release @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/github @semantic-release/exec

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions
          GIT_AUTHOR_EMAIL: github-actions@github.com
          GIT_COMMITTER_NAME: github-actions
          GIT_COMMITTER_EMAIL: github-actions@github.com
        working-directory: G-rez-l-int-gration-et-la-livraison-continue-Application-Angular
        run: npx semantic-release --tag-format 'angular-v${version}'

  release-java:
    name: Release Java
    needs: [test, build-java]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.semantic.outputs.new_release_version }}
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install semantic-release
        run: npm install -g semantic-release @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/github @semantic-release/exec

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions
          GIT_AUTHOR_EMAIL: github-actions@github.com
          GIT_COMMITTER_NAME: github-actions
          GIT_COMMITTER_EMAIL: github-actions@github.com
        working-directory: G-rez-l-int-gration-et-la-livraison-continue-Application-Java
        run: npx semantic-release --tag-format 'java-v${version}'

  retag-angular:
    name: Retag Angular Image with Version
    needs: [release-angular, setup]
    if: needs.release-angular.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull, tag and push with semver
        run: |
          docker pull ${{ needs.setup.outputs.angular_image }}:main
          docker tag ${{ needs.setup.outputs.angular_image }}:main ${{ needs.setup.outputs.angular_image }}:${{ needs.release-angular.outputs.new_version }}
          docker push ${{ needs.setup.outputs.angular_image }}:${{ needs.release-angular.outputs.new_version }}

  retag-java:
    name: Retag Java Image with Version
    needs: [release-java, setup]
    if: needs.release-java.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull, tag and push with semver
        run: |
          docker pull ${{ needs.setup.outputs.java_image }}:main
          docker tag ${{ needs.setup.outputs.java_image }}:main ${{ needs.setup.outputs.java_image }}:${{ needs.release-java.outputs.new_version }}
          docker push ${{ needs.setup.outputs.java_image }}:${{ needs.release-java.outputs.new_version }}

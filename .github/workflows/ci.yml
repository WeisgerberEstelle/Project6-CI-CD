name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: G-rez-l-int-gration-et-la-livraison-continue-Application-Angular/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Run tests
        run: bash run-tests.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/**/*.xml

      - name: Publish Angular test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Angular Test Results
          path: test-results/G-rez-l-int-gration-et-la-livraison-continue-Application-Angular/*.xml
          reporter: java-junit

      - name: Publish Java test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Java Test Results
          path: test-results/G-rez-l-int-gration-et-la-livraison-continue-Application-Java/*.xml
          reporter: java-junit
